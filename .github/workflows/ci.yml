name: CI

on:
  # Run for all branches initially; revise the triggers when this workflow is adopted upstream.
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run test suite and packaging smoke test
        run: mvn --batch-mode --no-transfer-progress -Pgraphdb-packaging-smoke verify
